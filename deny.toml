# cargo-deny configuration
# Copyright (c) 2025 Varshith Gudur. Dual-licensed under MIT OR Apache-2.0.
#
# Enforced on every PR via EmbarkStudios/cargo-deny-action.
# See docs/phases/phase-1.10-ci-upgrades.md § D3 for rationale.
#
# Run locally: cargo deny check
#
# Schema: cargo-deny v2 (0.14+). The pre-v2 severity keys
# (vulnerability/unmaintained/unsound/notice, licenses.deny/unlicensed/copyleft)
# were removed upstream — under v2, anything not explicitly allowed is denied.

# Build the dependency graph with all features enabled so optional deps behind
# feature gates are still audited (replaces the old `--all-features` CLI flag).
[graph]
all-features = true

[licenses]
version = 2
# Allowed licenses for all transitive dependencies. Anything not listed here is
# denied — so copyleft (AGPL/GPL/SSPL) is rejected simply by omission.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "CC0-1.0",
    "MPL-2.0",
    "Zlib",
    "OpenSSL",
    # webpki-roots ships Mozilla's CA certificate set under this permissive
    # data license (pulled in via ureq for the `valori cluster` HTTP client).
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.8
# Crates with unusual or dual license expressions — reviewed and accepted.
exceptions = [
    # ring uses both ISC and OpenSSL. We accept both.
    { allow = ["ISC", "OpenSSL"], name = "ring" },
    # unicode-ident uses Unicode-DFS-2016 which is not OSI-approved but is
    # permissive and widely accepted in the Rust ecosystem.
    { allow = ["Unicode-DFS-2016", "MIT"], name = "unicode-ident" },
]

[advisories]
version = 2
# Database: https://github.com/rustsec/advisory-db (updated daily).
db-urls = ["https://github.com/rustsec/advisory-db"]
# Under v2 every advisory (vulnerability, unsound, unmaintained) is an error
# unless its ID is listed here. Each entry below is reviewed and dated; a new,
# unlisted advisory still fails the build.
ignore = [
    # ── Unmaintained crates (no safe upgrade available; low risk) ──────────────
    # These are transitive and have no maintained replacement on our current
    # dependency tree. Previously warn-only under the old cargo-deny schema.
    "RUSTSEC-2025-0141",  # bincode unmaintained (we use bincode 2.x directly)
    "RUSTSEC-2025-0119",  # number_prefix unmaintained (via indicatif progress bars)
    "RUSTSEC-2025-0134",  # rustls-pemfile unmaintained (via the rustls/tonic chain)
    "RUSTSEC-2023-0089",  # atomic-polyfill unmaintained (via embedded cortex-m chain)
    "RUSTSEC-2026-0110",  # bare-metal deprecated (via embedded cortex-m chain)

    # ── pyo3 vulnerabilities — TRACKED DEBT, fix required ─────────────────────
    # TODO(security): bump pyo3 0.23 → >=0.29 in crates/valori-ffi/Cargo.toml.
    # This is a multi-release major upgrade that changes the Bound<'py, T> API,
    # so it needs FFI code changes + a maturin build + the Python test suite —
    # out of scope for the CI-config fix. Until then these ship in the wheel.
    "RUSTSEC-2025-0020",  # pyo3 < 0.24.1: buffer overflow in PyString::from_object
    "RUSTSEC-2026-0177",  # pyo3 < 0.29.0: missing Sync bound on PyCFunction::new_closure
]

[bans]
# Prevent wildcard dependencies (they bypass Cargo.lock reproducibility)...
wildcards = "deny"
# ...but the internal workspace crates depend on each other by `path` with no
# version, which cargo-deny sees as a wildcard. Those are not registry deps and
# don't affect reproducibility, so exempt path-based wildcards.
allow-wildcard-paths = true
# Warn on multiple versions of the same crate — indicates dependency hell.
multiple-versions = "warn"
# Crates that must never appear in the dependency tree.
deny = [
    # openssl: prefer rustls. openssl C linkage makes cross-compilation painful
    # and the audit surface is large.
    { name = "openssl" },
    { name = "openssl-sys" },
]
# Permitted duplicates (some crates have multiple major versions in the tree).
skip = []
# Allow build-only duplicates (e.g. proc-macro crates at different versions).
skip-tree = []

[sources]
# Only allow crates from crates.io and our own workspace paths.
unknown-registry = "deny"
unknown-git      = "deny"
allow-registry   = ["https://github.com/rust-lang/crates.io-index"]
allow-git        = []
