name: Rust toolchain + cargo cache
description: Install Rust (configurable channel, components, targets) and restore the cargo registry cache.

inputs:
  toolchain:
    description: Rust toolchain channel — stable, nightly, or a pinned version like 1.78.0
    required: false
    default: stable
  components:
    description: Space-separated Rust components (e.g. llvm-tools-preview miri clippy rustfmt)
    required: false
    default: ""
  targets:
    description: Space-separated extra targets (e.g. wasm32-unknown-unknown)
    required: false
    default: ""
  cache-key:
    description: Extra suffix appended to the cache key to avoid cross-job cache collisions
    required: false
    default: default

runs:
  using: composite
  steps:
    - name: Install Rust (${{ inputs.toolchain }})
      uses: dtolnay/rust-toolchain@master
      with:
        toolchain: ${{ inputs.toolchain }}
        components: ${{ inputs.components }}
        targets: ${{ inputs.targets }}

    - name: Restore cargo cache
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/bin/
          ~/.cargo/registry/index/
          ~/.cargo/registry/cache/
          ~/.cargo/git/db/
          target/
        key: ${{ runner.os }}-cargo-${{ inputs.cache-key }}-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-${{ inputs.cache-key }}-
          ${{ runner.os }}-cargo-
