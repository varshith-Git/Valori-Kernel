name: End-to-End Tests

on:
  push:
    branches: [ "main" ]
    paths:
      - "crates/**"
      - "python/**"
      - "scripts/valori_e2e_tracer.py"
      - "Cargo.toml"
      - "Cargo.lock"
  pull_request:
    branches: [ "main" ]
    paths:
      - "crates/**"
      - "python/**"
      - "scripts/valori_e2e_tracer.py"
      - "Cargo.toml"
      - "Cargo.lock"
  workflow_dispatch:

jobs:
  run-e2e-tracer:
    name: Run Python E2E Tracer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-e2e-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-e2e-

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install maturin
        run: pip install maturin

      - name: Build and install valoricore wheel
        # maturin develop compiles the Rust extension and installs it into the
        # active Python environment in one step — no glob-expansion issues from
        # matching multiple wheel files, and no path-relativity bugs.
        working-directory: python
        run: maturin develop --release

      - name: Run E2E tracer
        run: python scripts/valori_e2e_tracer.py
