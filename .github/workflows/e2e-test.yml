name: End-to-End Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  run-e2e-tracer:
    name: Run Python E2E Tracer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build, Install, and Run E2E Test
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install maturin
          cd python
          maturin develop --release
          cd ..
          python valori_e2e_tracer.py
