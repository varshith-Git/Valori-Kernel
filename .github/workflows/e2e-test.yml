name: End-to-End Tests

on:
  push:
    branches: [ "main" ]
    paths:
      - "crates/**"
      - "python/**"
      - "scripts/valori_e2e_tracer.py"
      - "Cargo.toml"
      - "Cargo.lock"
  pull_request:
    branches: [ "main" ]
    paths:
      - "crates/**"
      - "python/**"
      - "scripts/valori_e2e_tracer.py"
      - "Cargo.toml"
      - "Cargo.lock"
  workflow_dispatch:

jobs:
  run-e2e-tracer:
    name: Run Python E2E Tracer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/rust-setup
        with:
          cache-key: e2e

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Create virtualenv and install maturin
        run: |
          python -m venv .venv
          .venv/bin/pip install maturin

      - name: Build and install valoricore wheel
        # maturin develop installs into the active venv in one step -
        # no glob-expansion issues, no path-relativity bugs.
        working-directory: python
        run: ../.venv/bin/maturin develop --release

      - name: Run E2E tracer
        run: .venv/bin/python scripts/valori_e2e_tracer.py
