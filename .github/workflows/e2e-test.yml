name: End-to-End Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  run-e2e-tracer:
    name: Run Python E2E Tracer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install maturin
        run: pip install maturin

      - name: Build and install local Python SDK (valoricore)
        working-directory: python
        # maturin develop builds the Rust FFI and injects it directly into the current Python environment
        run: maturin develop --release

      - name: Run E2E Tracer Script
        run: python valori_e2e_tracer.py
