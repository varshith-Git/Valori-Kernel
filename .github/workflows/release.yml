name: Signed release + SBOM (Phase 3.10)

# Triggered on version tags (v*).
# Builds cross-platform binaries, generates SPDX SBOM, signs everything with
# cosign keyless signing (Sigstore), and publishes a GitHub Release.
#
# Required permissions:
#   contents: write   — create GitHub Release and upload assets
#   packages: write   — push signed Docker image to GHCR
#   id-token: write   — OIDC token for cosign keyless signing (Sigstore)
#
# No long-lived secrets needed — cosign keyless uses the GitHub Actions OIDC
# token to sign and the transparency log (Rekor) for verification.
#
# Verify a binary after download:
#   cosign verify-blob \
#     --certificate valori-node-linux-amd64.pem \
#     --signature   valori-node-linux-amd64.sig \
#     --certificate-identity-regexp "https://github.com/varshith-git/valori-kernel" \
#     --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
#     valori-node-linux-amd64

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Version tag to release (e.g. v0.3.0)"
        required: true

env:
  REGISTRY:   ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/valori-kernel/valori-node

jobs:
  # ── 1. Build binaries for each platform ──────────────────────────────────────
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - target:  x86_64-unknown-linux-gnu
            runner:  ubuntu-22.04
            binary:  valori-node-linux-amd64
          - target:  aarch64-unknown-linux-gnu
            runner:  ubuntu-22.04
            binary:  valori-node-linux-arm64
            cross:   true
          - target:  x86_64-apple-darwin
            runner:  macos-14
            binary:  valori-node-darwin-amd64
          - target:  aarch64-apple-darwin
            runner:  macos-14
            binary:  valori-node-darwin-arm64

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (Linux cross-compilation)
        if: matrix.cross
        run: cargo install cross --locked

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build (native)
        if: "!matrix.cross"
        run: cargo build -p valori-node --release --target ${{ matrix.target }}

      - name: Build (cross)
        if: matrix.cross
        run: cross build -p valori-node --release --target ${{ matrix.target }}

      - name: Rename binary
        run: |
          cp target/${{ matrix.target }}/release/valori-node ${{ matrix.binary }}

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.binary }}
          path: ${{ matrix.binary }}
          retention-days: 1

  # ── 2. Generate SPDX SBOM ────────────────────────────────────────────────────
  sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-sbom
        run: cargo install cargo-sbom --locked

      - name: Generate SPDX SBOM
        run: |
          cargo sbom --output-format spdx_json_2_3 > valori-sbom.spdx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: valori-sbom
          path: valori-sbom.spdx.json
          retention-days: 1

  # ── 3. Sign binaries + SBOM with cosign, publish GitHub Release ──────────────
  sign-and-release:
    name: Sign & publish release
    needs: [build, sbom]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write   # needed for cosign keyless signing

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/

      - name: Flatten dist directory
        run: |
          find dist/ -mindepth 2 -type f | while read f; do
            dest="dist/$(basename "$f")"
            [ "$f" != "$dest" ] && mv "$f" "$dest"
          done
          find dist/ -mindepth 1 -maxdepth 1 -type d -empty -delete

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign binaries with cosign (keyless)
        run: |
          cd dist
          for binary in valori-node-*; do
            # Skip non-binary files (e.g. .spdx.json)
            [[ "$binary" == *.* ]] && continue
            echo "Signing $binary ..."
            cosign sign-blob \
              --yes \
              --output-certificate "${binary}.pem" \
              --output-signature   "${binary}.sig" \
              "$binary"
          done

      - name: Sign SBOM with cosign
        run: |
          cd dist
          cosign sign-blob \
            --yes \
            --output-certificate valori-sbom.spdx.json.pem \
            --output-signature   valori-sbom.spdx.json.sig \
            valori-sbom.spdx.json

      - name: Compute SHA-256 checksums
        run: |
          cd dist
          sha256sum valori-node-* valori-sbom.spdx.json > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Extract tag name
        id: tag
        run: echo "name=${GITHUB_REF_NAME:-${{ github.event.inputs.tag }}}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: Valori ${{ steps.tag.outputs.name }}
          body: |
            ## Valori ${{ steps.tag.outputs.name }}

            ### Binaries

            | Platform | File |
            |---|---|
            | Linux amd64  | `valori-node-linux-amd64`  |
            | Linux arm64  | `valori-node-linux-arm64`  |
            | macOS amd64  | `valori-node-darwin-amd64` |
            | macOS arm64  | `valori-node-darwin-arm64` |

            ### Verification

            Each binary ships with a `.pem` certificate and `.sig` signature generated by
            [cosign keyless signing](https://docs.sigstore.dev/signing/overview/) via
            GitHub Actions OIDC. Verify with:

            ```bash
            cosign verify-blob \
              --certificate valori-node-linux-amd64.pem \
              --signature   valori-node-linux-amd64.sig \
              --certificate-identity-regexp "https://github.com/varshith-git/valori-kernel" \
              --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
              valori-node-linux-amd64
            ```

            ### SBOM

            An SPDX 2.3 Software Bill of Materials is attached as `valori-sbom.spdx.json`
            with its own cosign signature. Inspect with:

            ```bash
            cat valori-sbom.spdx.json | python3 -m json.tool | grep -E "name|version|spdxId"
            ```

            ### Checksums

            See `SHA256SUMS.txt` for SHA-256 hashes of all release assets.
          files: |
            dist/valori-node-linux-amd64
            dist/valori-node-linux-amd64.pem
            dist/valori-node-linux-amd64.sig
            dist/valori-node-linux-arm64
            dist/valori-node-linux-arm64.pem
            dist/valori-node-linux-arm64.sig
            dist/valori-node-darwin-amd64
            dist/valori-node-darwin-amd64.pem
            dist/valori-node-darwin-amd64.sig
            dist/valori-node-darwin-arm64
            dist/valori-node-darwin-arm64.pem
            dist/valori-node-darwin-arm64.sig
            dist/valori-sbom.spdx.json
            dist/valori-sbom.spdx.json.pem
            dist/valori-sbom.spdx.json.sig
            dist/SHA256SUMS.txt
          draft: false
          prerelease: ${{ contains(steps.tag.outputs.name, '-') }}

  # ── 4. Sign and push Docker image ────────────────────────────────────────────
  sign-docker:
    name: Sign Docker image
    needs: sign-and-release
    runs-on: ubuntu-latest
    permissions:
      packages: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Sign Docker image with cosign (keyless)
        run: |
          cosign sign --yes \
            "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.push.outputs.digest }}"
