name: Docker Build & Smoke Test

# Validates the Dockerfile and both compose files on every PR.
# Does NOT push to any registry — that is docker-publish.yml (tags + main).
#
# Checks:
#  - Image builds from Dockerfile.
#  - Single-node compose (docker-compose.yml) starts and reaches healthy.
#  - Cluster compose (docker-compose.cluster.yml) — 3 nodes reach healthy.

on:
  push:
    branches: [ "main" ]
    paths:
      - "Dockerfile"
      - "docker-compose.yml"
      - "docker-compose.cluster.yml"
      - "crates/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/docker-build.yml"
  pull_request:
    branches: [ "main" ]
    paths:
      - "Dockerfile"
      - "docker-compose.yml"
      - "docker-compose.cluster.yml"
      - "crates/**"
      - "Cargo.toml"
      - "Cargo.lock"
  workflow_dispatch:

jobs:
  docker-build:
    name: Build & smoke-test Docker image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ hashFiles('Dockerfile', 'Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: valori-node:ci
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

      - name: Move cache (prevent cache growth)
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

      - name: Smoke-test single container
        run: |
          # No --rm: keep the container so we can always capture logs on failure.
          docker run -d \
            --name valori-smoke \
            -p 3001:3000 \
            -e VALORI_DIM=4 \
            -e VALORI_MAX_RECORDS=100 \
            valori-node:ci

          # Helper: print logs then clean up. Called on every failure path.
          dump_and_exit() {
            echo "=== container logs ==="
            docker logs valori-smoke 2>&1 || true
            echo "=== exit code ==="
            docker inspect --format '{{.State.ExitCode}}' valori-smoke 2>/dev/null || true
            docker rm -f valori-smoke 2>/dev/null || true
            exit 1
          }

          # Wait up to 100 s (20 × 5 s) for the container to reach healthy.
          echo "Waiting for health check..."
          REACHED_HEALTHY=false
          for i in $(seq 1 20); do
            STATUS=$(docker inspect --format '{{.State.Health.Status}}' valori-smoke 2>/dev/null || echo "gone")
            echo "  [$i] status: $STATUS"
            case "$STATUS" in
              healthy)
                REACHED_HEALTHY=true
                break
                ;;
              gone)
                echo "Container exited before becoming healthy."
                dump_and_exit
                ;;
              unhealthy)
                echo "Container health check failed."
                dump_and_exit
                ;;
            esac
            sleep 5
          done

          if [ "$REACHED_HEALTHY" != "true" ]; then
            echo "Container never reached healthy state after 100 s."
            dump_and_exit
          fi

          # Quick functional check: hit /health over the forwarded port.
          HTTP=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3001/health || echo "000")
          echo "GET /health → HTTP $HTTP"
          if [ "$HTTP" != "200" ]; then
            echo "/health returned $HTTP — expected 200."
            dump_and_exit
          fi

          docker stop -t 0 valori-smoke
          docker rm valori-smoke
          echo "Smoke test passed."

      - name: Smoke-test single-node docker-compose.yml
        run: |
          # Use a Compose override to swap the ghcr.io image for the locally
          # built CI image. The override is written inline — no extra file to maintain.
          cat > /tmp/ci-image-override.yml << 'EOF'
          services:
            valori:
              image: valori-node:ci
          EOF

          # Only start the "valori" service — valori-ui's image isn't
          # published to GHCR for this CI run, and `up -d` with no service
          # argument would try (and fail) to pull it too.
          docker compose \
            -f docker-compose.yml \
            -f /tmp/ci-image-override.yml \
            up -d valori

          # Wait up to 60 s for the single node to become healthy.
          for i in $(seq 1 12); do
            STATUS=$(docker inspect --format '{{.State.Health.Status}}' valori 2>/dev/null || echo "gone")
            echo "  [$i] valori: $STATUS"
            [ "$STATUS" = "healthy" ] && break
            [ "$STATUS" = "gone"    ] && { echo "Container exited."; docker compose -f docker-compose.yml logs; exit 1; }
            sleep 5
          done

          HTTP=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/health || echo "000")
          echo "GET /health → HTTP $HTTP"
          [ "$HTTP" = "200" ] || { echo "Expected 200"; exit 1; }

          docker compose -f docker-compose.yml -f /tmp/ci-image-override.yml down -v
          echo "Single-node compose smoke test passed."
