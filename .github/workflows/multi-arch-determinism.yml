name: Multi-Architecture Determinism Validation

on:
  push:
    branches: [main]
    paths:
      - "crates/**"
      - "embedded/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/multi-arch-determinism.yml"
      - "!**.md"
      - "!docs/**"
  pull_request:
    branches: [main]
    paths:
      - "crates/**"
      - "embedded/**"
      - "Cargo.toml"
      - "Cargo.lock"
  workflow_dispatch:

jobs:
  # ── Per-arch test ──────────────────────────────────────────────────────────────
  # Add a new architecture by adding one row to the matrix.
  test:
    name: Determinism (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: x86_64-linux
            os: ubuntu-latest
            test_fn: determinism_x86
            hash_file: x86_hash.txt
            artifact: x86-hash

          - name: arm64-macos
            os: macos-latest
            test_fn: determinism_arm
            hash_file: arm_hash.txt
            artifact: arm-hash

          - name: wasm32
            os: ubuntu-latest
            test_fn: determinism_wasm
            hash_file: wasm_hash.txt
            artifact: wasm-hash
            wasm_target: wasm32-unknown-unknown

    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/rust-setup
        with:
          targets: ${{ matrix.wasm_target || '' }}
          cache-key: determinism-${{ matrix.name }}

      # WASM no_std gate: build the kernel for WASM before running the test.
      # The test function itself runs on the native runner; cross-arch
      # determinism is guaranteed by Q16.16 fixed-point math, not a WASM VM.
      - name: Build kernel for WASM (no_std gate)
        if: matrix.wasm_target
        run: cargo build -p valori-kernel --lib --target wasm32-unknown-unknown --release --no-default-features

      - name: Run determinism test
        run: |
          cargo test -p valori-node --test multi_arch_determinism --release \
            ${{ matrix.test_fn }} -- --nocapture --test-threads=1 \
            > output.txt 2>&1
          RC=$?; [ $RC -eq 0 ] || { cat output.txt; exit $RC; }

      - name: Extract hash
        run: |
          grep "HASH:" output.txt | head -1 | cut -d':' -f2 | tr -d '[:space:]' \
            > ${{ matrix.hash_file }}
          [ -s "${{ matrix.hash_file }}" ] || {
            echo "ERROR: no HASH line in test output"; cat output.txt; exit 1
          }
          cat ${{ matrix.hash_file }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.hash_file }}

  # ── Cross-arch validation ──────────────────────────────────────────────────────
  validate:
    name: Validate determinism across architectures
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with: { name: x86-hash }
      - uses: actions/download-artifact@v4
        with: { name: arm-hash }
      - uses: actions/download-artifact@v4
        with: { name: wasm-hash }

      - name: Compare hashes
        run: |
          X86=$(cat x86_hash.txt  | tr -d '[:space:]')
          ARM=$(cat arm_hash.txt  | tr -d '[:space:]')
          WASM=$(cat wasm_hash.txt | tr -d '[:space:]')

          echo "x86_64 : $X86"
          echo "ARM64  : $ARM"
          echo "WASM32 : $WASM"

          if [ "$X86" = "$ARM" ] && [ "$ARM" = "$WASM" ]; then
            echo "SUCCESS — all hashes match"
          else
            echo "FAILURE — hashes diverge (determinism broken)"
            exit 1
          fi
