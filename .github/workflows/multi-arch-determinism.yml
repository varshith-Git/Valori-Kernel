name: Multi-Architecture Determinism Validation

on:
  push:
    branches: [ main ]
    paths:
      - 'crates/**'
      - 'embedded/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/**'
      # Ignore documentation changes
      - '!**.md'
      - '!docs/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'crates/**'
      - 'embedded/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
  workflow_dispatch:  # Allow manual triggering

jobs:
  # Test on x86_64 Linux
  test-x86:
    name: "Determinism Test (x86_64 Linux)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          
      - name: Run determinism test
        run: |
          cargo test -p valori-node --test multi_arch_determinism --release determinism_x86 -- --nocapture --test-threads=1 > x86_output.txt 2>&1
          # Redirect exit code — $? reflects cargo test, not the redirect.
          RC=$?; [ $RC -eq 0 ] || { cat x86_output.txt; exit $RC; }

      - name: Extract hash
        run: |
          grep "HASH:" x86_output.txt | head -1 | cut -d':' -f2 | tr -d '[:space:]' > x86_hash.txt
          [ -s x86_hash.txt ] || { echo "ERROR: no HASH line in test output"; cat x86_output.txt; exit 1; }
          cat x86_hash.txt
          
      - name: Upload hash artifact
        uses: actions/upload-artifact@v4
        with:
          name: x86-hash
          path: x86_hash.txt

  # Test on ARM64 macOS
  test-arm:
    name: "Determinism Test (ARM64 macOS)"
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          
      - name: Run determinism test
        run: |
          cargo test -p valori-node --test multi_arch_determinism --release determinism_arm -- --nocapture --test-threads=1 > arm_output.txt 2>&1
          RC=$?; [ $RC -eq 0 ] || { cat arm_output.txt; exit $RC; }

      - name: Extract hash
        run: |
          grep "HASH:" arm_output.txt | head -1 | cut -d':' -f2 | tr -d '[:space:]' > arm_hash.txt
          [ -s arm_hash.txt ] || { echo "ERROR: no HASH line in test output"; cat arm_output.txt; exit 1; }
          cat arm_hash.txt
          
      - name: Upload hash artifact
        uses: actions/upload-artifact@v4
        with:
          name: arm-hash
          path: arm_hash.txt

  # Test on WASM32
  test-wasm:
    name: "Determinism Test (WASM32)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust + WASM target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-wasm-cargo-${{ hashFiles('**/Cargo.lock') }}
          
      - name: Build kernel for WASM (no_std gate)
        run: |
          cargo build -p valori-kernel --lib --target wasm32-unknown-unknown --release

      - name: Run determinism_wasm test (native runner — WASM build above is the no_std gate)
        run: |
          # The determinism_wasm test function runs on the native x86 runner.
          # Cross-arch determinism is guaranteed by Q16.16 fixed-point math, not
          # by running in a WASM VM. The WASM build step above is the real check.
          cargo test -p valori-node --test multi_arch_determinism --release determinism_wasm -- --nocapture --test-threads=1 > wasm_output.txt 2>&1
          RC=$?; [ $RC -eq 0 ] || { cat wasm_output.txt; exit $RC; }

      - name: Extract hash
        run: |
          grep "HASH:" wasm_output.txt | head -1 | cut -d':' -f2 | tr -d '[:space:]' > wasm_hash.txt
          [ -s wasm_hash.txt ] || { echo "ERROR: no HASH line in test output"; cat wasm_output.txt; exit 1; }
          cat wasm_hash.txt
          
      - name: Upload hash artifact
        uses: actions/upload-artifact@v4
        with:
          name: wasm-hash
          path: wasm_hash.txt

  # Compare all hashes
  validate:
    name: "Validate Determinism Across Architectures"
    needs: [test-x86, test-arm, test-wasm]
    runs-on: ubuntu-latest
    steps:
      - name: Download x86 hash
        uses: actions/download-artifact@v4
        with:
          name: x86-hash
          
      - name: Download ARM hash
        uses: actions/download-artifact@v4
        with:
          name: arm-hash
          
      - name: Download WASM hash
        uses: actions/download-artifact@v4
        with:
          name: wasm-hash
          
      - name: Compare hashes
        run: |
          echo "=== Multi-Architecture Determinism Validation ==="
          echo ""
          echo "x86_64 hash: $(cat x86_hash.txt)"
          echo "ARM64  hash: $(cat arm_hash.txt)"
          echo "WASM32 hash: $(cat wasm_hash.txt)"
          echo ""
          
          X86_HASH=$(cat x86_hash.txt | tr -d '[:space:]')
          ARM_HASH=$(cat arm_hash.txt | tr -d '[:space:]')
          WASM_HASH=$(cat wasm_hash.txt | tr -d '[:space:]')
          
          if [ "$X86_HASH" = "$ARM_HASH" ] && [ "$ARM_HASH" = "$WASM_HASH" ]; then
            echo "✅✅✅ SUCCESS! All hashes match!"
            echo "🎯 Determinism verified across x86, ARM, and WASM"
            exit 0
          else
            echo "❌ FAILURE: Hashes do not match!"
            echo "Determinism broken - this should never happen"
            exit 1
          fi

