name: Publish Python SDK to PyPI

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run — build wheels but skip the PyPI upload"
        required: false
        default: "false"
        type: boolean

concurrency:
  group: pypi-publish
  cancel-in-progress: false

jobs:
  # ── maturin-action wheels (Linux x86, macOS arm/intel, Windows) ───────────────
  # Add a new platform by adding one row to the matrix.
  build-wheels:
    name: Build wheel (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: linux-x86_64,   os: ubuntu-latest,  target: x86_64,               manylinux: auto, artifact: wheels-linux-x86_64  }
          - { name: macos-arm64,    os: macos-latest,   target: aarch64-apple-darwin,  manylinux: auto, artifact: wheels-macos-arm64    }
          - { name: macos-intel,    os: macos-latest,   target: x86_64-apple-darwin,   manylinux: auto, artifact: wheels-macos-intel    }
          - { name: windows-x86_64, os: windows-latest, target: x86_64-pc-windows-msvc, manylinux: auto, artifact: wheels-windows-x86_64 }

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          manylinux: ${{ matrix.manylinux }}
          working-directory: python
          args: --release --out dist --find-interpreter
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: python/dist/
          if-no-files-found: error

  # ── Linux ARM64 — requires native docker cross-compilation ────────────────────
  # Different mechanism (raw docker run) so kept as a separate job.
  build-linux-arm64:
    name: Build wheel (linux-aarch64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Build wheel natively in ARM64 container
        run: |
          docker run --rm --platform linux/arm64 \
            -v ${{ github.workspace }}:/io \
            quay.io/pypa/manylinux2014_aarch64 bash -c "
              curl https://sh.rustup.rs -sSf | sh -s -- -y --profile minimal
              source \$HOME/.cargo/env
              /opt/python/cp39-cp39/bin/pip install maturin
              cd /io/python
              /opt/python/cp39-cp39/bin/maturin build --release --out dist
            "
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-aarch64
          path: python/dist/
          if-no-files-found: error

  # ── Source distribution (fallback for exotic platforms) ───────────────────────
  build-sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          working-directory: python
          args: --out dist
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-sdist
          path: python/dist/
          if-no-files-found: error

  # ── Upload all to PyPI ────────────────────────────────────────────────────────
  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [build-wheels, build-linux-arm64, build-sdist]
    permissions:
      id-token: write   # required for PyPI Trusted Publishers (OIDC)

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist/

      - name: Show packages about to be uploaded
        run: |
          echo "Uploading to PyPI:"
          ls -lh dist/
          echo "Total: $(ls dist/ | wc -l) files"

      - name: Publish to PyPI
        if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.dry_run != 'true' }}
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          verbose: true
