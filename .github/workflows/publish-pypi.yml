name: Publish Python SDK to PyPI

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run — build wheels but skip the PyPI upload"
        required: false
        default: "false"
        type: boolean

concurrency:
  group: pypi-publish
  cancel-in-progress: false

jobs:
  # ── Linux x86-64 ──────────────────────────────────────────────────────────
  # This is the most important target — Google Colab, most cloud servers,
  # and Docker containers all run on x86-64 Linux.
  build-linux-x86:
    name: Build Linux x86-64 wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build wheel (manylinux — works on all glibc Linux)
        uses: PyO3/maturin-action@v1
        with:
          target: x86_64
          manylinux: auto
          working-directory: python
          args: --release --out dist --find-interpreter

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-x86_64
          path: python/dist/
          if-no-files-found: error

  # ── Linux ARM64 ───────────────────────────────────────────────────────────
  # Needed for AWS Graviton, Raspberry Pi, and ARM-based Linux servers.
  # Cross-compilation requires zig as the linker — installed before maturin runs.
  build-linux-arm64:
    name: Build Linux ARM64 wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # zig is the cross-compilation linker that maturin uses for aarch64 on x86 machines.
      # Without this, cargo can't link the final .so for a different CPU architecture.
      - name: Install zig (cross-compilation linker)
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.13.0

      - name: Build wheel (aarch64 via zig cross-compile)
        uses: PyO3/maturin-action@v1
        with:
          target: aarch64
          manylinux: off
          working-directory: python
          args: --release --out dist --find-interpreter --zig

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-aarch64
          path: python/dist/
          if-no-files-found: error

  # ── macOS ARM64 (M1/M2/M3) ───────────────────────────────────────────────
  build-macos-arm:
    name: Build macOS ARM64 wheel
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          target: aarch64-apple-darwin
          working-directory: python
          args: --release --out dist --find-interpreter

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-macos-arm64
          path: python/dist/
          if-no-files-found: error

  # ── macOS Intel ───────────────────────────────────────────────────────────
  build-macos-intel:
    name: Build macOS Intel wheel
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          target: x86_64-apple-darwin
          working-directory: python
          args: --release --out dist --find-interpreter

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-macos-intel
          path: python/dist/
          if-no-files-found: error

  # ── Windows x86-64 ────────────────────────────────────────────────────────
  build-windows:
    name: Build Windows wheel
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          target: x86_64-pc-windows-msvc
          working-directory: python
          args: --release --out dist --find-interpreter

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-windows-x86_64
          path: python/dist/
          if-no-files-found: error

  # ── Source distribution ───────────────────────────────────────────────────
  # Fallback for exotic platforms. Requires Rust on the end user's machine.
  build-sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          working-directory: python
          args: --out dist

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-sdist
          path: python/dist/
          if-no-files-found: error

  # ── Upload all to PyPI ────────────────────────────────────────────────────
  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs:
      - build-linux-x86
      - build-linux-arm64
      - build-macos-arm
      - build-macos-intel
      - build-windows
      - build-sdist

    permissions:
      id-token: write   # required for PyPI Trusted Publishers (OIDC)

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist/

      - name: Show packages about to be uploaded
        run: |
          echo "📦 Uploading to PyPI:"
          ls -lh dist/
          echo "Total: $(ls dist/ | wc -l) files"

      - name: Publish to PyPI
        if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.dry_run != 'true' }}
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          verbose: true
