name: Publish Python SDK to PyPI

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run — build wheels but skip the PyPI upload"
        required: false
        default: "false"
        type: boolean

concurrency:
  group: pypi-publish
  cancel-in-progress: false

jobs:
  # ── Linux x86-64 + ARM64 ──────────────────────────────────────────────────
  build-linux:
    name: Build Linux wheels (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [x86_64, aarch64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build wheels (manylinux)
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          manylinux: auto
          # maturin-action runs from the repo root; point it at the python/ subdir
          working-directory: python
          args: --release --out dist --find-interpreter

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-${{ matrix.target }}
          # The wheel lands in python/dist/ because working-directory=python
          path: python/dist/
          if-no-files-found: error

  # ── macOS ARM64 (M1/M2/M3) + Intel ───────────────────────────────────────
  build-macos:
    name: Build macOS wheels (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-latest   # Apple Silicon runner
          - target: x86_64-apple-darwin
            runner: macos-13       # Last Intel runner on GitHub
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          working-directory: python
          args: --release --out dist --find-interpreter

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-macos-${{ matrix.target }}
          path: python/dist/
          if-no-files-found: error

  # ── Windows x86-64 ────────────────────────────────────────────────────────
  build-windows:
    name: Build Windows wheels
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: x86_64-pc-windows-msvc
          working-directory: python
          args: --release --out dist --find-interpreter

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-windows-x86_64
          path: python/dist/
          if-no-files-found: error

  # ── Source distribution (sdist) ───────────────────────────────────────────
  # Fallback for exotic platforms not covered above.
  # pip will use this and compile Rust locally if no wheel matches.
  build-sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          working-directory: python
          args: --out dist

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-sdist
          path: python/dist/
          if-no-files-found: error

  # ── Upload all wheels to PyPI ─────────────────────────────────────────────
  #
  # Uses PyPI Trusted Publishers (OIDC) — no API token/password stored anywhere.
  #
  # ONE-TIME SETUP REQUIRED on PyPI:
  #   1. pypi.org → your project → Settings → "Trusted Publishers"
  #   2. Add publisher:
  #        GitHub owner:    varshith-Git
  #        Repository:      Valori-Kernel
  #        Workflow file:   publish-pypi.yml
  #        Environment:     (leave blank — we removed the environment requirement
  #                          so this works without creating a GitHub Environment)
  # ─────────────────────────────────────────────────────────────────────────
  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    # Only runs after ALL four build jobs succeed
    needs: [build-linux, build-macos, build-windows, build-sdist]

    # Required for OIDC / Trusted Publishers authentication
    permissions:
      id-token: write

    steps:
      - name: Download all wheel + sdist artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist/

      - name: Show what we are about to upload
        run: |
          echo "📦 Files ready for PyPI:"
          ls -lh dist/
          echo "Total: $(ls dist/ | wc -l) packages"

      # Skip the upload if this was triggered as a dry run from workflow_dispatch
      - name: Publish to PyPI
        if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.dry_run != 'true' }}
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          verbose: true
