//
// Raft inter-node RPC surface (Phase 2.4).
//
// The payload of every message is the bincode encoding of the corresponding
// openraft request/response type (openraft's `serde` feature). Protobuf is
// the framing, not the schema: openraft's types evolve with the openraft
// version, and re-modelling them field-by-field in proto would create a
// second source of truth. The version handshake that guards mixed-version
// clusters lands with Phase 2.10.
//
// Replies carry `Result<Resp, RaftError>` (bincode) — Raft-level errors are
// data, not transport failures; gRPC status codes are reserved for actual
// transport problems.
//
// shard_id (Phase S1 — multi-Raft skeleton): identifies which independent
// Raft group this message belongs to. A binary built before this field
// existed decodes it as 0, which is harmless while every deployment runs
// a single shard (VALORI_SHARD_COUNT=1) but means shard-aware and
// pre-S1 binaries must NOT be mixed in a cluster running more than one
// shard — there is no rolling-upgrade path across this change once
// shard_count > 1 is in use.

syntax = "proto3";
package valori.raft;

message RaftRequest {
  // bincode of the openraft request type for this RPC.
  bytes payload = 1;
  // Which Raft group (shard) this request targets. 0 = the sole shard
  // in a single-shard deployment.
  uint32 shard_id = 2;
}

message RaftReply {
  // bincode of Result<openraft response, openraft RaftError>.
  bytes payload = 1;
  // Echoes the request's shard_id.
  uint32 shard_id = 2;
}

service RaftService {
  rpc AppendEntries(RaftRequest) returns (RaftReply);
  rpc Vote(RaftRequest) returns (RaftReply);
  rpc InstallSnapshot(RaftRequest) returns (RaftReply);
}
