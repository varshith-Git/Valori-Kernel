# Valori 3-node Raft cluster
# Copyright (c) 2025 Varshith Gudur. Dual-licensed under MIT OR Apache-2.0.
#
# Single-leader, 3-node Raft layout for local dev, smoke-testing, and EC2.
# node-1 bootstraps the cluster (VALORI_CLUSTER_INIT=1); nodes 2 & 3 join
# once node-1's TCP health check passes (HTTP port open, Raft gRPC running).
#
# Usage:
#   docker compose up -d          # start cluster in background
#   docker compose ps              # check health (healthy / starting / unhealthy)
#   docker compose logs -f node-1  # tail node-1 logs
#   docker compose down -v         # stop + wipe volumes
#
# From your laptop (EC2_IP = public IP of the EC2 host):
#   curl http://EC2_IP:3001/health
#   curl -X POST http://EC2_IP:3001/records -H 'Content-Type: application/json' \
#        -d '{"values":[1.0,2.0,3.0]}'
#   curl -X POST http://EC2_IP:3001/search  -H 'Content-Type: application/json' \
#        -d '{"query":[1.0,2.0,3.0],"k":5}'

version: "3.9"

x-node-common: &node-common
  build:
    context: .
    dockerfile: Dockerfile
  restart: unless-stopped
  environment: &env-common
    VALORI_DIM: "128"
    VALORI_MAX_RECORDS: "1000000"
    VALORI_MAX_NODES: "100000"
    VALORI_MAX_EDGES: "500000"
    VALORI_SNAPSHOT_EVERY_EVENTS: "50000"
    VALORI_SNAPSHOT_KEEP: "3"
    # Raft cluster topology (Phase 2): id=raft_addr/api_addr per member.
    VALORI_CLUSTER_MEMBERS: "1=node-1:3100/node-1:3000,2=node-2:3100/node-2:3000,3=node-3:3100/node-3:3000"
    VALORI_RAFT_BIND: "0.0.0.0:3100"
    VALORI_RAFT_LOG_PATH: /data/raft.redb
  healthcheck:
    test: ["CMD", "/usr/local/bin/valori-node", "--health-check"]
    interval: 15s
    timeout: 3s
    start_period: 20s
    retries: 3

services:
  node-1:
    <<: *node-common
    container_name: valori-node-1
    ports:
      - "3001:3000"
    environment:
      <<: *env-common
      VALORI_NODE_ID: "1"
      VALORI_CLUSTER_INIT: "1"
      VALORI_BIND: "0.0.0.0:3000"
      VALORI_EVENT_LOG_PATH: /data/events.log
      VALORI_SNAPSHOT_PATH: /data/state.snap
    volumes:
      - node-1-data:/data

  node-2:
    <<: *node-common
    container_name: valori-node-2
    ports:
      - "3002:3000"
    environment:
      <<: *env-common
      VALORI_NODE_ID: "2"
      VALORI_BIND: "0.0.0.0:3000"
      VALORI_EVENT_LOG_PATH: /data/events.log
      VALORI_SNAPSHOT_PATH: /data/state.snap
    volumes:
      - node-2-data:/data
    depends_on:
      node-1:
        condition: service_healthy

  node-3:
    <<: *node-common
    container_name: valori-node-3
    ports:
      - "3003:3000"
    environment:
      <<: *env-common
      VALORI_NODE_ID: "3"
      VALORI_BIND: "0.0.0.0:3000"
      VALORI_EVENT_LOG_PATH: /data/events.log
      VALORI_SNAPSHOT_PATH: /data/state.snap
    volumes:
      - node-3-data:/data
    depends_on:
      node-1:
        condition: service_healthy

volumes:
  node-1-data:
  node-2-data:
  node-3-data:

networks:
  default:
    name: valori-cluster
