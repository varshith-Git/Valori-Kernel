# Copyright (c) 2025 Varshith Gudur. Dual-licensed under MIT OR Apache-2.0.
#
# This is the default compose file: one valori-node + one web dashboard.
# For a 3-node Raft cluster use: docker compose -f docker-compose.cluster.yml up -d
#
# Quick start (no-code, non-technical users):
#   docker compose up -d
#   open http://localhost:3001        ← web dashboard
#
# Quick start (developers, Python SDK):
#   docker compose up -d
#   curl http://localhost:3000/health
#   pip install valoricore
#   from valoricore.remote import SyncRemoteClient
#   db = SyncRemoteClient("http://localhost:3000")
#   db.insert([0.1, 0.2, 0.3])
#   print(db.get_proof())
#
# Dashboard-only (if you already have a node running on :3000):
#   docker compose up -d valori-ui
#
# Upgrading to a cluster later:
#   1. docker compose exec valori curl -X POST http://localhost:3000/v1/snapshot
#   2. docker compose down
#   3. Copy the named volume 'valori-data' to node-1's volume in docker-compose.cluster.yml
#      (docker run --rm -v valori-data:/src -v valori-cluster-node-1-data:/dst alpine cp -a /src/. /dst/)
#   4. docker compose -f docker-compose.cluster.yml up -d
#      Node-1 recovers from the snapshot; nodes 2+3 receive it via Raft snapshot transfer.

services:
  valori:
    image: ghcr.io/varshith-git/valori-kernel/valori-node:latest
    # Build locally if no published image is available yet:
    # build:
    #   context: .
    #   dockerfile: Dockerfile
    container_name: valori
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      # ── Core ──────────────────────────────────────────────────────────────
      VALORI_DIM: "1536"          # Match your embedding model dimension.
                                   # Cannot be changed after first insert.
      VALORI_MAX_RECORDS: "1000000"
      VALORI_MAX_NODES:   "100000"
      VALORI_MAX_EDGES:   "500000"
      VALORI_BIND: "0.0.0.0:3000"

      # ── Persistence ───────────────────────────────────────────────────────
      VALORI_EVENT_LOG_PATH:      /data/events.log
      VALORI_SNAPSHOT_PATH:       /data/state.snap
      VALORI_SNAPSHOT_INTERVAL:   "60"     # write a snapshot every 60 s (survives kill -9)

      # ── Auth (optional) ───────────────────────────────────────────────────
      # VALORI_AUTH_TOKEN: "change-me"        # uncomment to require Bearer token

      # ── Object store backup (optional, requires S3 credentials) ───────────
      # VALORI_OBJECT_STORE_URL: "s3://your-bucket/valori"
      # VALORI_OBJECT_STORE_REGION: "us-east-1"
      # AWS_ACCESS_KEY_ID: ""
      # AWS_SECRET_ACCESS_KEY: ""

    volumes:
      - valori-data:/data

    healthcheck:
      test: ["CMD", "/usr/local/bin/valori-node", "--health-check"]
      interval: 15s
      timeout: 3s
      start_period: 10s
      retries: 3

  valori-ui:
    image: ghcr.io/varshith-git/valori-kernel/valori-ui:latest
    # Build locally from the ui/ directory:
    # build:
    #   context: ui
    #   dockerfile: Dockerfile
    container_name: valori-ui
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      # Points the Next.js server-side proxy at the valori node.
      # Uses the Docker network service name — never exposed to the browser.
      VALORI_NODE_URL: "http://valori:3000"
      NODE_ENV: "production"
    depends_on:
      valori:
        condition: service_healthy

volumes:
  valori-data:
    driver: local
